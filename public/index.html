<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Estate Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      body { background: #09090b; color: #f4f4f5; }
      .prose p { margin: 0.25rem 0; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-zinc-800 px-6 py-3 flex items-center justify-between">
      <h1 class="font-semibold text-zinc-100">Real Estate Agent</h1>

      <div class="flex items-center gap-3">
        <!-- Mode badge -->
        <button
          id="modeBtn"
          title="Click to switch execution mode"
          class="text-xs font-mono border rounded px-3 py-1 transition-colors"
        >…</button>

        <button
          id="clearBtn"
          class="text-xs text-zinc-500 hover:text-zinc-300 border border-zinc-700 rounded px-3 py-1 transition-colors"
        >Clear</button>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-4 space-y-4 max-w-3xl w-full mx-auto"></div>

    <!-- Input -->
    <div class="border-t border-zinc-800 px-6 py-4">
      <div class="max-w-3xl mx-auto flex gap-3">
        <input
          id="input"
          type="text"
          placeholder="Ask about listings or create one…"
          class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-zinc-500"
        />
        <button
          id="sendBtn"
          class="bg-zinc-100 text-zinc-900 rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >Send</button>
      </div>
    </div>

    <script>
      marked.setOptions({ breaks: true, gfm: true });

      const SESSION_ID = 'default';
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/agents/real-estate-agent/${SESSION_ID}`;

      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const clearBtn = document.getElementById('clearBtn');
      const modeBtn = document.getElementById('modeBtn');

      let ws = null;
      let chatMessages = [];
      let streaming = { element: null, content: '' };
      let toolElement = null;
      let awaitingResponse = false;
      let usageBeforeSend = { inputTokens: 0, outputTokens: 0, requests: 0 };
      let lastAssistantEl = null;
      let codeModeAvailable = false;

      async function refreshMode() {
        try {
          const resp = await fetch('/api/mode');
          const { mode, codeModeAvailable: avail } = await resp.json();
          codeModeAvailable = avail;
          if (mode === 'codemode') {
            modeBtn.textContent = 'code mode';
            modeBtn.className = 'text-xs font-mono border rounded px-3 py-1 transition-colors text-orange-400 border-orange-800 hover:border-orange-600';
          } else if (mode === 'direct') {
            modeBtn.textContent = 'direct';
            modeBtn.className = 'text-xs font-mono border rounded px-3 py-1 transition-colors text-blue-400 border-blue-800 hover:border-blue-600';
          } else {
            modeBtn.textContent = 'mode: unset';
            modeBtn.className = 'text-xs font-mono border rounded px-3 py-1 transition-colors text-zinc-500 border-zinc-700 hover:border-zinc-500';
          }
        } catch {}
      }

      modeBtn.addEventListener('click', async () => {
        if (!codeModeAvailable) {
          appendStatus('Code Mode requires a Cloudflare Workers paid plan.');
          return;
        }
        const resp = await fetch('/api/mode');
        const { mode } = await resp.json();
        const next = mode === 'codemode' ? 'direct' : 'codemode';
        await fetch('/api/mode', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mode: next }),
        });
        await refreshMode();
        appendStatus(`Switched to ${next} mode`);
      });

      async function refreshUsage() {
        try {
          const resp = await fetch('/api/usage');
          return await resp.json();
        } catch {}
        return null;
      }

      function connect() {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          sendBtn.disabled = false;
          appendStatus('Connected');
          refreshMode();
        };

        ws.onclose = () => {
          sendBtn.disabled = true;
          appendStatus('Disconnected — reload to reconnect');
        };

        ws.onerror = () => appendStatus('Connection error');

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type !== 'cf_agent_use_chat_response') return;
          const ev = JSON.parse(msg.body);
          handleEvent(ev);
        };
      }

      function handleEvent(ev) {
        switch (ev.type) {
          case 'text-start':
            streaming.content = '';
            streaming.element = appendAssistant('');
            lastAssistantEl = streaming.element;
            toolElement = null;
            break;

          case 'text-delta':
            streaming.content += ev.delta ?? '';
            if (streaming.element) {
              streaming.element.innerHTML = marked.parse(streaming.content);
            }
            scrollBottom();
            break;

          case 'text-end':
            if (awaitingResponse) {
              awaitingResponse = false;
              sendBtn.disabled = false;
              inputEl.disabled = false;
              const capturedEl = lastAssistantEl;
              const capturedBefore = { ...usageBeforeSend };
              setTimeout(async () => {
                const current = await refreshUsage();
                if (current && capturedEl) {
                  const deltaIn = current.inputTokens - capturedBefore.inputTokens;
                  const deltaOut = current.outputTokens - capturedBefore.outputTokens;
                  if (deltaIn > 0 || deltaOut > 0) {
                    appendTokenBadge(capturedEl, deltaIn, deltaOut);
                  }
                }
              }, 500);
            }
            streaming.element = null;
            break;

          case 'tool-input-available':
            toolElement = appendTool(ev.toolName, ev.input);
            break;

          case 'tool-output-available':
            if (toolElement) appendToolOutput(toolElement, ev.output);
            break;
        }
      }

      function appendAssistant(text) {
        const div = document.createElement('div');
        div.className = 'border-l-2 border-blue-500/40 pl-4 py-1 text-sm text-zinc-200 prose prose-invert max-w-none';
        div.innerHTML = text ? marked.parse(text) : '';
        messagesEl.appendChild(div);
        scrollBottom();
        return div;
      }

      function appendUser(text) {
        const div = document.createElement('div');
        div.className = 'ml-8 bg-zinc-800 rounded-lg px-4 py-2.5 text-sm text-zinc-100';
        div.textContent = text;
        messagesEl.appendChild(div);
        scrollBottom();
      }

      function appendTool(name, input) {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-xs font-mono text-zinc-400';
        div.innerHTML = `<div class="text-zinc-500 mb-1">tool: ${name}</div><pre class="whitespace-pre-wrap text-zinc-300">${JSON.stringify(input, null, 2)}</pre>`;
        messagesEl.appendChild(div);
        scrollBottom();
        return div;
      }

      function appendToolOutput(toolEl, output) {
        const pre = document.createElement('pre');
        pre.className = 'mt-2 pt-2 border-t border-zinc-800 whitespace-pre-wrap text-zinc-400';
        const text = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
        pre.textContent = text.length > 1000 ? text.slice(0, 1000) + '\n…' : text;
        toolEl.appendChild(pre);
        scrollBottom();
      }

      function appendTokenBadge(parentEl, deltaIn, deltaOut) {
        const div = document.createElement('div');
        div.className = 'mt-1 text-xs text-zinc-600 font-mono';
        div.textContent = `↑ ${deltaIn.toLocaleString()} in · ↓ ${deltaOut.toLocaleString()} out`;
        parentEl.appendChild(div);
        scrollBottom();
      }

      function appendStatus(text) {
        const div = document.createElement('div');
        div.className = 'text-xs text-zinc-600 text-center py-1';
        div.textContent = text;
        messagesEl.appendChild(div);
      }

      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function send() {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN || awaitingResponse) return;

        inputEl.value = '';
        appendUser(text);

        chatMessages.push({ id: crypto.randomUUID(), role: 'user', content: text });

        awaitingResponse = true;
        sendBtn.disabled = true;
        inputEl.disabled = true;

        // Snapshot usage before sending so we can compute the delta after
        const snapshot = await refreshUsage();
        usageBeforeSend = snapshot ?? usageBeforeSend;

        ws.send(JSON.stringify({
          type: 'cf_agent_use_chat_request',
          id: crypto.randomUUID(),
          init: {
            method: 'POST',
            body: JSON.stringify({ messages: chatMessages }),
          },
        }));
      }

      sendBtn.addEventListener('click', send);
      inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

      clearBtn.addEventListener('click', async () => {
        await fetch('/api/clear', { method: 'POST' });
        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(JSON.stringify({ type: 'cf_agent_chat_clear' }));
        }
        chatMessages = [];
        messagesEl.innerHTML = '';
        usageBeforeSend = { inputTokens: 0, outputTokens: 0, requests: 0 };
        await refreshMode();
        appendStatus('Cleared');
      });

      sendBtn.disabled = true;
      connect();
    </script>
  </body>
</html>
