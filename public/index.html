<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Real Estate Agent</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
      body { background: #09090b; color: #f4f4f5; }
      .prose p { margin: 0.25rem 0; }
    </style>
  </head>
  <body class="min-h-screen flex flex-col">

    <!-- Header -->
    <header class="border-b border-zinc-800 px-6 py-3 flex items-center justify-between">
      <h1 class="font-semibold text-zinc-100">Real Estate Agent</h1>

      <!-- Token counter -->
      <div class="flex items-center gap-4">
        <div id="tokenStats" class="text-xs text-zinc-500 flex gap-3 font-mono">
          <span>↑ <span id="inputTokens">0</span> in</span>
          <span>↓ <span id="outputTokens">0</span> out</span>
          <span>⟳ <span id="requests">0</span> req</span>
        </div>
        <button
          id="clearBtn"
          class="text-xs text-zinc-500 hover:text-zinc-300 border border-zinc-700 rounded px-3 py-1 transition-colors"
        >Clear</button>
      </div>
    </header>

    <!-- Messages -->
    <div id="messages" class="flex-1 overflow-y-auto px-6 py-4 space-y-4 max-w-3xl w-full mx-auto"></div>

    <!-- Input -->
    <div class="border-t border-zinc-800 px-6 py-4">
      <div class="max-w-3xl mx-auto flex gap-3">
        <input
          id="input"
          type="text"
          placeholder="Ask about listings or create one…"
          class="flex-1 bg-zinc-800 border border-zinc-700 rounded-lg px-4 py-2.5 text-sm text-zinc-100 placeholder-zinc-500 focus:outline-none focus:border-zinc-500"
        />
        <button
          id="sendBtn"
          class="bg-zinc-100 text-zinc-900 rounded-lg px-4 py-2.5 text-sm font-medium hover:bg-white disabled:opacity-40 disabled:cursor-not-allowed transition-colors"
        >Send</button>
      </div>
    </div>

    <script>
      marked.setOptions({ breaks: true, gfm: true });

      const SESSION_ID = 'default';
      const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
      const wsUrl = `${protocol}//${location.host}/agents/real-estate-agent/${SESSION_ID}`;

      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('input');
      const sendBtn = document.getElementById('sendBtn');
      const clearBtn = document.getElementById('clearBtn');
      const inputTokensEl = document.getElementById('inputTokens');
      const outputTokensEl = document.getElementById('outputTokens');
      const requestsEl = document.getElementById('requests');

      let ws = null;
      let chatMessages = [];
      let streaming = { element: null, content: '' };
      let toolElement = null;
      let awaitingResponse = false;

      async function refreshUsage() {
        try {
          const resp = await fetch('/api/usage');
          const { inputTokens, outputTokens, requests } = await resp.json();
          inputTokensEl.textContent = inputTokens.toLocaleString();
          outputTokensEl.textContent = outputTokens.toLocaleString();
          requestsEl.textContent = requests.toLocaleString();
        } catch {}
      }

      function connect() {
        ws = new WebSocket(wsUrl);

        ws.onopen = () => {
          sendBtn.disabled = false;
          appendStatus('Connected');
          refreshUsage();
        };

        ws.onclose = () => {
          sendBtn.disabled = true;
          appendStatus('Disconnected — reload to reconnect');
        };

        ws.onerror = () => appendStatus('Connection error');

        ws.onmessage = (event) => {
          const msg = JSON.parse(event.data);
          if (msg.type !== 'cf_agent_use_chat_response') return;
          const ev = JSON.parse(msg.body);
          handleEvent(ev);
        };
      }

      function handleEvent(ev) {
        switch (ev.type) {
          case 'text-start':
            streaming.content = '';
            streaming.element = appendAssistant('');
            toolElement = null;
            break;

          case 'text-delta':
            streaming.content += ev.delta ?? '';
            if (streaming.element) {
              streaming.element.innerHTML = marked.parse(streaming.content);
            }
            scrollBottom();
            break;

          case 'text-end':
            if (awaitingResponse) {
              awaitingResponse = false;
              sendBtn.disabled = false;
              inputEl.disabled = false;
              refreshUsage();
            }
            streaming.element = null;
            break;

          case 'tool-input-available':
            toolElement = appendTool(ev.toolName, ev.input);
            break;

          case 'tool-output-available':
            if (toolElement) appendToolOutput(toolElement, ev.output);
            break;
        }
      }

      function appendAssistant(text) {
        const div = document.createElement('div');
        div.className = 'border-l-2 border-blue-500/40 pl-4 py-1 text-sm text-zinc-200 prose prose-invert max-w-none';
        div.innerHTML = text ? marked.parse(text) : '';
        messagesEl.appendChild(div);
        scrollBottom();
        return div;
      }

      function appendUser(text) {
        const div = document.createElement('div');
        div.className = 'ml-8 bg-zinc-800 rounded-lg px-4 py-2.5 text-sm text-zinc-100';
        div.textContent = text;
        messagesEl.appendChild(div);
        scrollBottom();
      }

      function appendTool(name, input) {
        const div = document.createElement('div');
        div.className = 'bg-zinc-900 border border-zinc-800 rounded-lg p-3 text-xs font-mono text-zinc-400';
        div.innerHTML = `<div class="text-zinc-500 mb-1">tool: ${name}</div><pre class="whitespace-pre-wrap text-zinc-300">${JSON.stringify(input, null, 2)}</pre>`;
        messagesEl.appendChild(div);
        scrollBottom();
        return div;
      }

      function appendToolOutput(toolEl, output) {
        const pre = document.createElement('pre');
        pre.className = 'mt-2 pt-2 border-t border-zinc-800 whitespace-pre-wrap text-zinc-400';
        const text = typeof output === 'string' ? output : JSON.stringify(output, null, 2);
        pre.textContent = text.length > 1000 ? text.slice(0, 1000) + '\n…' : text;
        toolEl.appendChild(pre);
        scrollBottom();
      }

      function appendStatus(text) {
        const div = document.createElement('div');
        div.className = 'text-xs text-zinc-600 text-center py-1';
        div.textContent = text;
        messagesEl.appendChild(div);
      }

      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      function send() {
        const text = inputEl.value.trim();
        if (!text || !ws || ws.readyState !== WebSocket.OPEN || awaitingResponse) return;

        inputEl.value = '';
        appendUser(text);

        chatMessages.push({ id: crypto.randomUUID(), role: 'user', content: text });

        awaitingResponse = true;
        sendBtn.disabled = true;
        inputEl.disabled = true;

        ws.send(JSON.stringify({
          type: 'cf_agent_use_chat_request',
          id: crypto.randomUUID(),
          init: {
            method: 'POST',
            body: JSON.stringify({ messages: chatMessages }),
          },
        }));
      }

      sendBtn.addEventListener('click', send);
      inputEl.addEventListener('keydown', (e) => { if (e.key === 'Enter') send(); });

      clearBtn.addEventListener('click', async () => {
        await fetch('/api/clear', { method: 'POST' });
        chatMessages = [];
        messagesEl.innerHTML = '';
        inputTokensEl.textContent = '0';
        outputTokensEl.textContent = '0';
        requestsEl.textContent = '0';
        appendStatus('Cleared');
      });

      sendBtn.disabled = true;
      connect();
    </script>
  </body>
</html>
